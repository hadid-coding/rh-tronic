<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RH Tronic" />
  <title>RH Tronic 🔧</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0c0e14; font-family: -apple-system, 'Segoe UI', sans-serif; overflow-x: hidden; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    input, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const GS_URL = "https://script.google.com/macros/s/AKfycbxueMT4HNHUjbWvpIpKm6RVyNfUvwPWlGIEeE3gEggoBf5fPU6XBTem8mLlgm2izcOuaA/exec";
    const STORAGE_KEY = "rh-tronic-ops-v2";

    const C = {
      bg:"#0c0e14", card:"#161923", card2:"#1e2231", border:"#252d3d",
      accent:"#f59e0b", dpf:"#3b82f6", flex:"#10b981", combo:"#a855f7",
      don:"#ef4444", text:"#f1f5f9", muted:"#64748b", success:"#10b981", purple:"#7c3aed",
    };

    const iS = { width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 12px", color:C.text, fontSize:15, boxSizing:"border-box" };

    const fDA = (n) => Number(n||0).toLocaleString("fr-DZ") + " DA";
    const todayStr = () => new Date().toLocaleDateString("fr-DZ");

    function calc(e) {
      let b = 0;
      if (e.hasDpf) b += 3000*(e.qty||1);
      if (e.hasFlex) b += Math.round((e.revenue||0)*0.25);
      const d = Math.round(b*0.05);
      return { brut:b, don:d, net:b-d };
    }

    function typeOf(e) { return e.hasDpf&&e.hasFlex?"combo":e.hasDpf?"dpf":"flex"; }

    function Badge({entry}) {
      const m = { dpf:{bg:"#3b82f622",color:"#60a5fa",label:"DPF Cleaner"}, flex:{bg:"#10b98122",color:"#34d399",label:"Flex Logiciel"}, combo:{bg:"#a855f722",color:"#d8b4fe",label:"DPF + Flex"} };
      const s = m[typeOf(entry)];
      return <span style={{background:s.bg,color:s.color,padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>{s.label}</span>;
    }

    function SyncBar({status, lastSync, onSync}) {
      const m = {
        idle:    {bg:"#1e2231",color:"#64748b",icon:"☁️",txt:"Google Sheets connecté"},
        syncing: {bg:"#f59e0b18",color:"#f59e0b",icon:"⟳",txt:"Synchronisation..."},
        ok:      {bg:"#10b98118",color:"#10b981",icon:"✓",txt:"Sauvegardé"+(lastSync?" · "+lastSync:"")},
        error:   {bg:"#ef444418",color:"#ef4444",icon:"⚠",txt:"Hors ligne · données locales OK"},
      };
      const c = m[status]||m.idle;
      return (
        <div style={{margin:"10px 18px 0",background:c.bg,border:`1px solid ${c.color}33`,borderRadius:10,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:c.color,fontSize:14}}>{c.icon}</span>
            <span style={{color:c.color,fontSize:12}}>{c.txt}</span>
          </div>
          {status!=="syncing" && <button onClick={onSync} style={{background:"none",border:`1px solid ${c.color}55`,color:c.color,borderRadius:8,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Sync</button>}
        </div>
      );
    }

    function Confirm({message, onOk, onCancel}) {
      return (
        <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,border:"1px solid #ef444455",borderRadius:18,padding:24,maxWidth:320,width:"100%"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>⚠️</div>
            <div style={{color:C.text,fontWeight:700,fontSize:16,textAlign:"center",marginBottom:8}}>Confirmer la suppression</div>
            <div style={{color:C.muted,fontSize:13,textAlign:"center",marginBottom:22}}>{message}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onCancel} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Annuler</button>
              <button onClick={onOk} style={{flex:1,background:"#ef4444",border:"none",color:"#fff",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Supprimer</button>
            </div>
          </div>
        </div>
      );
    }

    function Form({initial, onSave, onCancel, title}) {
      const [f, setF] = useState(initial);
      const db = f.hasDpf ? 3000*(f.qty||1) : 0;
      const fb = f.hasFlex ? Math.round((f.revenue||0)*0.25) : 0;
      const tb = db+fb, tn = Math.round(tb*0.95);
      const ok = f.hasDpf||f.hasFlex;
      return (
        <div style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:16,padding:18,marginBottom:16}}>
          <div style={{color:C.text,fontWeight:700,marginBottom:14,fontSize:15}}>{title}</div>
          <div style={{marginBottom:14}}>
            <label style={{color:C.muted,fontSize:12,display:"block",marginBottom:8}}>Services effectués</label>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setF({...f,hasDpf:!f.hasDpf})} style={{flex:1,padding:"11px 8px",borderRadius:10,border:`2px solid ${f.hasDpf?C.dpf:C.border}`,background:f.hasDpf?"#3b82f618":C.bg,color:f.hasDpf?"#60a5fa":C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>🔵 DPF</button>
              <button onClick={()=>setF({...f,hasFlex:!f.hasFlex})} style={{flex:1,padding:"11px 8px",borderRadius:10,border:`2px solid ${f.hasFlex?C.flex:C.border}`,background:f.hasFlex?"#10b98118":C.bg,color:f.hasFlex?"#34d399":C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>🟢 Flex</button>
            </div>
            {f.hasDpf&&f.hasFlex&&<div style={{textAlign:"center",color:"#d8b4fe",fontSize:11,fontWeight:700,marginTop:6,letterSpacing:1}}>✦ COMBO DPF + FLEX ✦</div>}
          </div>
          {f.hasDpf&&(
            <div style={{background:"#3b82f60a",border:"1px solid #3b82f622",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <label style={{color:"#60a5fa",fontSize:12,display:"block",marginBottom:6,fontWeight:600}}>🔵 DPF — Nombre d'opérations</label>
              <input type="number" min="1" value={f.qty} onChange={e=>setF({...f,qty:parseInt(e.target.value)||1})} style={{...iS,border:"1px solid #3b82f644"}} />
              <div style={{color:"#60a5fa",fontSize:12,marginTop:4}}>{f.qty} × 3 000 DA = <strong>{fDA(db)}</strong></div>
            </div>
          )}
          {f.hasFlex&&(
            <div style={{background:"#10b9810a",border:"1px solid #10b98122",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <label style={{color:"#34d399",fontSize:12,display:"block",marginBottom:6,fontWeight:600}}>🟢 Flex — Revenu total atelier (DA)</label>
              <input type="number" min="0" value={f.revenue} onChange={e=>setF({...f,revenue:parseInt(e.target.value)||0})} style={{...iS,border:"1px solid #10b98144"}} />
              <div style={{color:"#34d399",fontSize:12,marginTop:4}}>25% × {fDA(f.revenue)} = <strong>{fDA(fb)}</strong></div>
            </div>
          )}
          {ok&&(
            <div style={{background:C.card2,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
              <div><div style={{color:C.muted,fontSize:11}}>Brut</div><div style={{color:C.accent,fontWeight:700,fontSize:16}}>{fDA(tb)}</div></div>
              <div><div style={{color:C.muted,fontSize:11}}>Don 5%</div><div style={{color:C.don,fontWeight:600,fontSize:16}}>−{fDA(tb-tn)}</div></div>
              <div><div style={{color:C.muted,fontSize:11}}>Net Ahmed</div><div style={{color:C.success,fontWeight:700,fontSize:16}}>{fDA(tn)}</div></div>
            </div>
          )}
          <div style={{marginBottom:12}}>
            <label style={{color:C.muted,fontSize:12,display:"block",marginBottom:6}}>Date</label>
            <input type="text" value={f.date} onChange={e=>setF({...f,date:e.target.value})} style={iS} />
          </div>
          <div style={{marginBottom:16}}>
            <label style={{color:C.muted,fontSize:12,display:"block",marginBottom:6}}>Véhicule / Note (optionnel)</label>
            <input type="text" value={f.note} placeholder="Ex: Golf 6 TDI..." onChange={e=>setF({...f,note:e.target.value})} style={iS} />
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onCancel} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Annuler</button>
            <button onClick={()=>ok&&onSave(f)} style={{flex:2,background:ok?C.accent:C.border,border:"none",color:ok?"#0c0e14":C.muted,borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:ok?"pointer":"default"}}>✓ Enregistrer</button>
          </div>
        </div>
      );
    }

    function Card({entry, canEdit, onEdit, onDelete, onVersé}) {
      const c = calc(entry);
      return (
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10,position:"relative"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingRight:canEdit?68:0}}>
            <Badge entry={entry} />
            <span style={{color:C.muted,fontSize:12}}>{entry.date}</span>
          </div>
          {entry.note&&<div style={{color:C.muted,fontSize:13,marginBottom:8,fontStyle:"italic"}}>🚗 "{entry.note}"</div>}
          {entry.hasDpf&&<div style={{color:C.muted,fontSize:12,marginBottom:3}}>🔵 DPF : <strong style={{color:"#60a5fa"}}>{entry.qty} op. × 3 000 DA = {fDA(3000*entry.qty)}</strong></div>}
          {entry.hasFlex&&<div style={{color:C.muted,fontSize:12,marginBottom:3}}>🟢 Flex : <strong style={{color:"#34d399"}}>25% × {fDA(entry.revenue)} = {fDA(Math.round(entry.revenue*0.25))}</strong></div>}
          <div style={{display:"flex",gap:12,marginTop:10}}>
            <div><div style={{color:C.muted,fontSize:10}}>Brut</div><div style={{color:C.accent,fontWeight:700,fontSize:15}}>{fDA(c.brut)}</div></div>
            <div><div style={{color:C.muted,fontSize:10}}>Don 5%</div><div style={{color:C.don,fontWeight:600,fontSize:15}}>−{fDA(c.don)}</div></div>
            <div><div style={{color:C.muted,fontSize:10}}>Net</div><div style={{color:C.success,fontWeight:700,fontSize:15}}>{fDA(c.net)}</div></div>
          </div>
          {entry.versé
            ? <div style={{marginTop:8,background:"#10b98115",border:"1px solid #10b98133",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#34d399",display:"inline-block"}}>✓ Versé au compte</div>
            : canEdit&&<button onClick={()=>onVersé(entry.id)} style={{marginTop:8,background:"#10b98115",border:"1px solid #10b98133",color:"#34d399",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ Marquer versé</button>
          }
          {canEdit&&(
            <div style={{position:"absolute",top:10,right:10,display:"flex",gap:4}}>
              <button onClick={()=>onEdit(entry)} style={{background:"#3b82f618",border:"none",color:"#60a5fa",cursor:"pointer",fontSize:15,padding:"5px 8px",borderRadius:8}}>✏️</button>
              <button onClick={()=>onDelete(entry)} style={{background:"#ef444418",border:"none",color:"#f87171",cursor:"pointer",fontSize:15,padding:"5px 8px",borderRadius:8}}>🗑️</button>
            </div>
          )}
        </div>
      );
    }

    function BarChart({data, color}) {
      const max = Math.max(...data.map(d=>d.value),1);
      return (
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
          {data.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",background:color+"33",borderRadius:"4px 4px 0 0",position:"relative",height:50}}>
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:color,borderRadius:"4px 4px 0 0",height:`${(d.value/max)*100}%`}} />
              </div>
              <div style={{color:C.muted,fontSize:9,textAlign:"center"}}>{d.label}</div>
            </div>
          ))}
        </div>
      );
    }

    function Stats({ops}) {
      const [period, setPeriod] = useState("semaine");
      function group(entries, mode) {
        const g={};
        entries.forEach(e=>{
          const p=e.date.split("/"); let k;
          if(p.length===3){const d=new Date(`${p[2]}-${p[1]}-${p[0]}`);if(isNaN(d)){k=e.date;}else if(mode==="semaine"){const dow=d.getDay()===0?6:d.getDay()-1;const m=new Date(d);m.setDate(d.getDate()-dow);k=`${String(m.getDate()).padStart(2,"0")}/${String(m.getMonth()+1).padStart(2,"0")}`;}else{k=`${String(d.getMonth()+1).padStart(2,"0")}/${p[2]}`;}}else{k=e.date;}
          if(!g[k])g[k]=[];g[k].push(e);
        });
        return g;
      }
      const gr=group(ops,period), keys=Object.keys(gr).slice(-8);
      const cd=keys.map(k=>({label:k.slice(0,5),value:gr[k].reduce((s,e)=>s+calc(e).net,0)}));
      const tN=ops.reduce((s,e)=>s+calc(e).net,0), tB=ops.reduce((s,e)=>s+calc(e).brut,0), tD=ops.reduce((s,e)=>s+calc(e).don,0), nV=ops.filter(e=>!e.versé).reduce((s,e)=>s+calc(e).net,0);
      const dp=ops.filter(e=>e.hasDpf), fl=ops.filter(e=>e.hasFlex), co=ops.filter(e=>e.hasDpf&&e.hasFlex);
      const moy=keys.length>0?Math.round(cd.reduce((s,d)=>s+d.value,0)/keys.length):0;
      const best=cd.reduce((b,d)=>d.value>(b?.value||0)?d:b,null);
      const versed=ops.filter(e=>e.versé).sort((a,b)=>b.id-a.id);
      return (
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{label:"Revenu net total",value:fDA(tN),color:C.success,icon:"💰"},{label:"En attente",value:fDA(nV),color:"#a78bfa",icon:"⏳"},{label:"Total brut",value:fDA(tB),color:C.accent,icon:"📈"},{label:"Dons versés",value:fDA(tD),color:C.don,icon:"🤲"}].map(s=>(
              <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 14px"}}>
                <div style={{fontSize:18,marginBottom:4}}>{s.icon}</div>
                <div style={{color:C.muted,fontSize:10,marginBottom:2}}>{s.label}</div>
                <div style={{color:s.color,fontWeight:800,fontSize:15}}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:12}}>Répartition par service</div>
            {[{label:"🔵 DPF",count:dp.length,net:dp.reduce((s,e)=>s+3000*(e.qty||1)*0.95,0),color:"#60a5fa"},{label:"🟢 Flex",count:fl.length,net:fl.reduce((s,e)=>s+Math.round((e.revenue||0)*0.25*0.95),0),color:"#34d399"},{label:"✦ Combos",count:co.length,net:co.reduce((s,e)=>s+calc(e).net,0),color:"#d8b4fe"}].map(r=>(
              <div key={r.label} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:r.color,fontSize:12}}>{r.label}</span><span style={{color:C.text,fontSize:12,fontWeight:700}}>{r.count} · {fDA(r.net)}</span></div>
                <div style={{height:6,background:C.card2,borderRadius:99}}><div style={{height:6,background:r.color,borderRadius:99,width:`${tN>0?Math.round((r.net/tN)*100):0}%`}} /></div>
              </div>
            ))}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{color:C.muted,fontSize:12}}>Revenus nets par {period}</div>
              <div style={{display:"flex",gap:4}}>
                {["semaine","mois"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 10px",borderRadius:8,border:"none",background:period===p?C.accent:C.card2,color:period===p?"#0c0e14":C.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>{p==="semaine"?"Sem.":"Mois"}</button>)}
              </div>
            </div>
            {cd.length>0?(<><BarChart data={cd} color={C.accent} /><div style={{display:"flex",gap:12,marginTop:10}}><div><div style={{color:C.muted,fontSize:10}}>Moyenne/{period}</div><div style={{color:C.accent,fontWeight:700,fontSize:13}}>{fDA(moy)}</div></div>{best&&<div><div style={{color:C.muted,fontSize:10}}>Meilleure période</div><div style={{color:C.success,fontWeight:700,fontSize:13}}>{best.label} · {fDA(best.value)}</div></div>}</div></>)
            :<div style={{color:C.muted,textAlign:"center",padding:"20px 0",fontSize:13}}>Pas encore de données</div>}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:10}}>Historique des versements</div>
            {versed.length===0?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>Aucun versement</div>:versed.map(e=>{const c=calc(e);return(<div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{color:C.text,fontSize:13,fontWeight:600}}>{fDA(c.net)}</div><div style={{color:C.muted,fontSize:11}}>{e.date}{e.note?" · "+e.note:""}</div></div><div style={{color:"#34d399",fontSize:11,fontWeight:700}}>✓ Versé</div></div>);})}
            {versed.length>0&&<div style={{marginTop:10,display:"flex",justifyContent:"space-between"}}><span style={{color:C.muted,fontSize:12}}>Total versé</span><span style={{color:C.success,fontWeight:800,fontSize:14}}>{fDA(versed.reduce((s,e)=>s+calc(e).net,0))}</span></div>}
          </div>
        </div>
      );
    }

    function Resume({ops}) {
      const tB=ops.reduce((s,o)=>s+calc(o).brut,0), tN=ops.reduce((s,o)=>s+calc(o).net,0), tD=ops.reduce((s,o)=>s+calc(o).don,0), nV=ops.filter(o=>!o.versé).reduce((s,o)=>s+calc(o).net,0);
      const dp=ops.filter(o=>o.hasDpf), fl=ops.filter(o=>o.hasFlex);
      return (
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{label:"Total brut",value:fDA(tB),color:C.accent},{label:"Net total",value:fDA(tN),color:C.success},{label:"Dons (5%)",value:fDA(tD),color:C.don},{label:"En attente versement",value:fDA(nV),color:"#a78bfa"}].map(s=>(
              <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
                <div style={{color:C.muted,fontSize:11,marginBottom:4}}>{s.label}</div>
                <div style={{color:s.color,fontWeight:800,fontSize:17}}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:10}}>Par type de service</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:"#60a5fa",fontSize:13}}>🔵 DPF Cleaner</span><span style={{color:C.text,fontWeight:700}}>{dp.length} · {fDA(dp.reduce((s,o)=>s+3000*(o.qty||1)*0.95,0))}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:"#34d399",fontSize:13}}>🟢 Flex Logiciel</span><span style={{color:C.text,fontWeight:700}}>{fl.length} · {fDA(fl.reduce((s,o)=>s+Math.round((o.revenue||0)*0.25*0.95),0))}</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#d8b4fe",fontSize:13}}>✦ Combos</span><span style={{color:C.text,fontWeight:700}}>{ops.filter(o=>o.hasDpf&&o.hasFlex).length} entrées</span></div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:4}}>Total entrées</div>
            <div style={{color:C.text,fontWeight:800,fontSize:24}}>{ops.length}</div>
          </div>
        </div>
      );
    }

    const EF = { hasDpf:true, hasFlex:false, qty:1, revenue:0, note:"", date:todayStr() };

    function App() {
      const [mode, setMode] = useState(null);
      const [ops, setOps] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [tab, setTab] = useState("ops");
      const [syncStatus, setSyncStatus] = useState("idle");
      const [lastSync, setLastSync] = useState(null);
      const [loading, setLoading] = useState(true);

      const syncToSheets = useCallback(async (data) => {
        setSyncStatus("syncing");
        try {
          await fetch(GS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ops:data})
          });
          const now = new Date();
          setLastSync(`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`);
          setSyncStatus("ok");
        } catch(_) { setSyncStatus("error"); }
      }, []);

      useEffect(() => {
        const load = async () => {
          setLoading(true);
          const local = localStorage.getItem(STORAGE_KEY);
          const localOps = local ? JSON.parse(local) : [];
          try {
            const res = await fetch(GS_URL + "?t=" + Date.now());
            const data = await res.json();
            if (data.ops && Array.isArray(data.ops) && data.ops.length > 0) {
              const sheetsMap = {}; data.ops.forEach(o => sheetsMap[o.id] = o);
              const localMap = {}; localOps.forEach(o => localMap[o.id] = o);
              const merged = Object.values({...sheetsMap, ...localMap});
              merged.sort((a,b) => b.id - a.id);
              setOps(merged);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
              setSyncStatus("ok"); setLastSync("synchronisé");
            } else {
              setOps(localOps);
              setSyncStatus(localOps.length > 0 ? "ok" : "idle");
            }
          } catch(_) {
            setOps(localOps);
            setSyncStatus(localOps.length > 0 ? "error" : "idle");
          }
          setLoading(false);
        };
        load();
        // Rafraîchissement toutes les 2 minutes sans écraser les données locales
        const iv = setInterval(async () => {
          try {
            const res = await fetch(GS_URL + "?t=" + Date.now());
            const data = await res.json();
            if (data.ops && Array.isArray(data.ops) && data.ops.length > 0) {
              const local = localStorage.getItem(STORAGE_KEY);
              const localOps = local ? JSON.parse(local) : [];
              const sheetsMap = {}; data.ops.forEach(o => sheetsMap[o.id] = o);
              const localMap = {}; localOps.forEach(o => localMap[o.id] = o);
              const merged = Object.values({...sheetsMap, ...localMap});
              merged.sort((a,b) => b.id - a.id);
              setOps(merged);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
              setSyncStatus("ok");
            }
          } catch(_) {}
        }, 120000);
        return () => clearInterval(iv);
      }, []);

      const save = async (next) => {
        setOps(next);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        syncToSheets(next);
      };

      const canEdit = mode==="ramzi"||mode==="ahmed";
      const addE = async (f) => { await save([{...f,id:Date.now(),versé:false},...ops]); setShowForm(false); };
      const updE = async (f) => { await save(ops.map(o=>o.id===editing.id?{...editing,...f}:o)); setEditing(null); };
      const delE = async () => { await save(ops.filter(o=>o.id!==deleting.id)); setDeleting(null); };
      const marV = async (id) => { await save(ops.map(o=>o.id===id?{...o,versé:true}:o)); };

      if (loading) return (
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:42,marginBottom:16}}>🔧</div>
          <div style={{color:C.accent,fontWeight:700,fontSize:16,marginBottom:8}}>RH Tronic</div>
          <div style={{color:C.muted,fontSize:13}}>Chargement depuis Google Sheets...</div>
        </div>
      );

      if (!mode) return (
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:52,marginBottom:8}}>🔧</div>
            <h1 style={{color:C.text,fontSize:26,fontWeight:800,margin:0}}>RH Tronic</h1>
            <p style={{color:C.muted,fontSize:14,marginTop:6}}>Suivi des revenus partenariat</p>
          </div>
          <div style={{marginBottom:28,display:"flex",alignItems:"center",gap:8,background:syncStatus==="ok"?"#10b98115":"#ef444415",border:`1px solid ${syncStatus==="ok"?"#10b98133":"#ef444433"}`,borderRadius:10,padding:"8px 16px"}}>
            <span style={{fontSize:14}}>{syncStatus==="ok"?"✓":"⚠"}</span>
            <span style={{color:syncStatus==="ok"?"#34d399":"#f87171",fontSize:12,fontWeight:600}}>{syncStatus==="ok"?"Google Sheets connecté · données à jour":"Mode hors ligne · données locales"}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14,width:"100%",maxWidth:300}}>
            <button onClick={()=>setMode("ramzi")} style={{background:C.accent,color:"#0c0e14",border:"none",borderRadius:14,padding:"18px 24px",fontSize:16,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
              👷 Ramzi
              <div style={{fontSize:12,fontWeight:500,marginTop:2,opacity:0.7}}>Saisir & gérer les opérations</div>
            </button>
            <button onClick={()=>setMode("ahmed")} style={{background:C.purple,color:"#fff",border:"none",borderRadius:14,padding:"18px 24px",fontSize:16,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
              🤝 Ahmed
              <div style={{fontSize:12,fontWeight:500,marginTop:2,opacity:0.7}}>Consulter & modifier</div>
            </button>
          </div>
        </div>
      );

      const TABS = [{id:"ops",label:"📋 Ops"},{id:"stats",label:"📊 Stats"},{id:"resume",label:"💰 Résumé"}];

      return (
        <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
          {deleting&&<Confirm message={`Supprimer l'entrée ${typeOf(deleting).toUpperCase()} du ${deleting.date} ?`} onOk={delE} onCancel={()=>setDeleting(null)} />}
          <div style={{padding:"20px 18px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <h1 style={{color:C.text,fontSize:20,fontWeight:800,margin:0}}>RH Tronic 🔧</h1>
              <p style={{color:C.muted,fontSize:12,margin:"2px 0 0"}}>{mode==="ramzi"?"👷 Ramzi":"🤝 Ahmed"} · {ops.length} opérations</p>
            </div>
            <button onClick={()=>{setMode(null);setShowForm(false);setEditing(null);}} style={{background:C.card,border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>Changer</button>
          </div>
          <SyncBar status={syncStatus} lastSync={lastSync} onSync={()=>syncToSheets(ops)} />
          <div style={{display:"flex",gap:6,padding:"14px 18px 0"}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"none",background:tab===t.id?C.accent:C.card,color:tab===t.id?"#0c0e14":C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>{t.label}</button>)}
          </div>
          {tab==="stats"&&<Stats ops={ops} />}
          {tab==="resume"&&<Resume ops={ops} />}
          {tab==="ops"&&(
            <div style={{padding:"16px 18px"}}>
              {canEdit&&!showForm&&!editing&&<button onClick={()=>setShowForm(true)} style={{width:"100%",background:C.accent,color:"#0c0e14",border:"none",borderRadius:14,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16}}>+ Ajouter une opération</button>}
              {canEdit&&showForm&&<Form initial={{...EF,date:todayStr()}} title="Nouvelle opération" onSave={addE} onCancel={()=>setShowForm(false)} />}
              {editing&&<Form initial={{hasDpf:editing.hasDpf,hasFlex:editing.hasFlex,qty:editing.qty||1,revenue:editing.revenue||0,note:editing.note||"",date:editing.date}} title="✏️ Modifier l'opération" onSave={updE} onCancel={()=>setEditing(null)} />}
              {ops.length===0&&!showForm&&<div style={{textAlign:"center",color:C.muted,padding:"40px 0",fontSize:14}}>Aucune opération enregistrée</div>}
              {ops.map(e=><Card key={e.id} entry={e} canEdit={canEdit} onEdit={en=>{setEditing(en);setShowForm(false);}} onDelete={en=>setDeleting(en)} onVersé={marV} />)}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
